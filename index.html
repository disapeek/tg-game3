<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Match Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #f5f5f5;
            --tg-theme-text-color: #222;
            --tg-theme-button-color: #3897f0;
            --tg-theme-button-text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            height: 100vh;
        }

        #header {
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0,0,0,0.05);
            font-weight: bold;
        }

        #score { font-size: 1.2em; }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 4px;
            width: 90vw;
            height: 90vw;
            max-width: 400px;
            max-height: 400px;
            margin-top: 20px;
            background-color: #ddd;
            border-radius: 8px;
            padding: 4px;
        }

        .block {
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s ease-in-out, opacity 0.2s;
        }

        .block:active {
            transform: scale(0.9);
        }

        .color-0 { background-color: #ff5f5f; }
        .color-1 { background-color: #5fff5f; }
        .color-2 { background-color: #5f5fff; }
